name: Terraform CI / CD — OyD

# Trigger: all PR activity against main.
# - plan   → opened, updated, or reopened PRs (gates merge via branch ruleset)
# - deploy → when a PR is actually merged (closed + merged == true)
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  # DELIVERY J (disabled temporarily — re-enable after Slack bot is deployed)
  # workflow_dispatch:
  #   inputs:
  #     environment:
  #       description: "Target environment to deploy (dev or staging)"
  #       required: true
  #       type: choice
  #       options:
  #         - dev
  #         - staging

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── PR validation checks (run on every PR update, not on close) ─────────────
  # Three SEPARATE jobs so GitHub reports three individual status checks
  # (job name == check context). The main branch ruleset requires all three:
  #   "terraform fmt", "terraform validate", "terraform plan".
  # Splitting into jobs is required because step-level results do NOT report
  # individual statuses to GitHub — only the job's overall status does.

  # Check 1 — formatting. Needs no AWS and no backend.
  terraform-fmt:
    if: github.event.action != 'closed'
    name: terraform fmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Terraform Format
        run: terraform fmt -check -recursive

  # Check 2 — schema/syntax validation. No AWS creds; backend init skipped.
  terraform-validate:
    if: github.event.action != 'closed'
    name: terraform validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Terraform Init (no backend)
        run: terraform init -input=false -backend=false

      - name: Terraform Validate
        run: terraform validate

  # Check 3 — plan against the dev environment. Authenticates with the dev OIDC
  # role, saves the plan as the tfplan artifact (consumed verbatim by deploy-dev),
  # and posts the diff as a collapsible PR comment.
  plan:
    if: github.event.action != 'closed'
    name: terraform plan
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Pre-installs Lambda Layer deps so archive_file always reads a complete
      # node_modules/. Without this, fresh CI checkouts where package.json hasn't
      # changed would leave the null_resource trigger cold → zip is incomplete.
      - name: Build Lambda Layer (pdf-lib + qrcode)
        run: npm install --omit=dev
        working-directory: infra/modules/lambda/layer/nodejs

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config=envs/dev/backend-dev.hcl

      # Detects if the live S3 endpoint still references a route table that was
      # already destroyed (e.g. old private_endpoints RT removed in ae65e57).
      # When detected, it outputs -replace so the plan step forces recreation.
      # This check is self-healing: after one successful replacement, subsequent
      # runs find all RTs valid and skip the flag.
      - name: Check S3 endpoint route tables
        id: s3check
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          REPLACE=""
          if terraform state show "module.network.aws_vpc_endpoint.s3[0]" &>/dev/null; then
            ROUTE_TABLES=$(terraform state show "module.network.aws_vpc_endpoint.s3[0]" | sed -n '/route_table_ids/,/]/p' | grep -oP 'rtb-[a-z0-9]+' || true)
            for rt in $ROUTE_TABLES; do
              if ! aws ec2 describe-route-tables --route-table-ids "$rt" --region "$AWS_REGION" &>/dev/null; then
                echo "Stale route table $rt no longer exists, forcing S3 endpoint recreation"
                REPLACE="-replace=module.network.aws_vpc_endpoint.s3[0]"
                break
              fi
            done
          fi
          echo "replace_flag=$REPLACE" >> $GITHUB_OUTPUT

      # Saves the plan to a binary file (tfplan) so the apply job can replay the
      # EXACT reviewed plan, and streams the human-readable diff to plan.txt for
      # the PR comment. The same db_password is baked into tfplan at plan time.
      - name: Terraform Plan
        env:
          TF_VAR_db_password: ${{ secrets.DEV_DB_PASSWORD }}
        run: terraform plan ${{ steps.s3check.outputs.replace_flag }} -out=tfplan -input=false -var-file=envs/dev/dev.tfvars -no-color 2>&1 | tee plan.txt

      # Promotes the exact plan to deploy-dev as a workflow artifact. deploy-dev
      # downloads this same tfplan and runs `terraform apply tfplan` — never a re-plan.
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: infra/tfplan
          retention-days: 5
          if-no-files-found: error

      # The layer zip is generated on-runner by archive_file during plan.
      # deploy-dev runs on a fresh checkout and can't re-run archive_file
      # (saved-plan apply skips data sources), so we pass the zip across
      # as an artifact — same mechanism as tfplan.
      - name: Upload Lambda layer artifact
        uses: actions/upload-artifact@v4
        with:
          name: receipt-layer-dev
          path: infra/modules/lambda/layer/receipt-layer.zip
          retention-days: 5
          if-no-files-found: error

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `<details><summary>Terraform Plan (dev)</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`
            });

  # ── Deploy dev (runs on PR merge) ──────────────────────────────────────────
  # Applies the EXACT plan reviewed in the PR. No reviewer gate — the branch
  # ruleset + required plan check is the merge control. Downloads the tfplan
  # artifact produced by the plan job for this PR's head SHA and runs
  # `terraform apply tfplan` (never a re-plan). actions:read is required to
  # locate and download the artifact from the plan run (a different workflow run).
  deploy-dev:
    if: github.event.pull_request.merged == true
    name: Deploy → dev
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
      actions: read
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Locate the plan run for this PR's head SHA (the plan job runs in a
      # separate workflow run triggered by the PR, so its artifact is cross-run).
      - name: Find PR plan run
        id: planrun
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The PR's head SHA matches BOTH the PR-validation run (which uploaded
          # tfplan-dev) and THIS merge/close run (which did not). Exclude the
          # current run id and require a successful conclusion so we land on the
          # validation run that actually holds the artifact.
          RUN_ID=$(gh run list \
            --workflow terraform-ci.yml \
            --event pull_request \
            --limit 100 \
            --json databaseId,headSha,conclusion \
            --jq "[.[] | select(.headSha==\"${{ github.event.pull_request.head.sha }}\" and (.databaseId|tostring) != \"${{ github.run_id }}\" and .conclusion==\"success\")][0].databaseId")
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::No successful PR plan run with a tfplan-dev artifact found for head SHA ${{ github.event.pull_request.head.sha }}"
            exit 1
          fi
          echo "Found plan run $RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      # Download the EXACT tfplan reviewed in the PR — do not re-plan.
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: infra
          run-id: ${{ steps.planrun.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Restore the layer zip from the plan run so that aws_lambda_layer_version.receipt
      # can read it at apply time. archive_file does not re-run during a saved-plan apply,
      # and the zip is gitignored, so we must pass it explicitly via artifact.
      - name: Download Lambda layer artifact
        uses: actions/download-artifact@v4
        with:
          name: receipt-layer-dev
          path: infra/modules/lambda/layer
          run-id: ${{ steps.planrun.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config=envs/dev/backend-dev.hcl

      # Applies the saved plan verbatim. Fails if the state drifted since the
      # plan was generated ("saved plan is stale") — the intended safety guard.
      - name: Terraform Apply (saved plan)
        run: terraform apply -input=false tfplan

      # Build and push the API image AFTER apply so the ECR repository is
      # guaranteed to exist (Terraform creates/recreates it in the step above).
      # This survives the repo being deleted out-of-band in AWS: apply restores
      # it, then we push. The repo URL is read from the Terraform output rather
      # than hardcoded, so it always matches the repo the ECS task pulls from
      # (oyd-project-<env>-api).
      - name: Build & push API image to ECR
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          API_REPO=$(terraform output -raw ecr_api_repository_url)
          REGISTRY="${API_REPO%%/*}"

          echo "Logging in to ECR..."
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$REGISTRY"

          echo "Building backend API image..."
          docker build -t parking-api:latest ../backend

          echo "Tagging and pushing to ECR..."
          docker tag parking-api:latest "${API_REPO}:latest"
          docker push "${API_REPO}:latest"

          echo "API image pushed to ${API_REPO}:latest"

      - name: Migrate database (ECS run-task inside the VPC)
        # Applies any pending Drizzle migration files (drizzle/migrations/) that
        # have not yet been recorded in the drizzle_migrations table. Idempotent.
        # Waits for the task to stop and fails the pipeline on non-zero exit so a
        # broken migration blocks the deploy before the app restarts.
        # Uses public subnets + assignPublicIp=ENABLED (no NAT Gateway required).
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SG=$(terraform output -raw app_security_group_id)
          SUBNETS=$(terraform output -json public_subnet_ids | tr -d '[]"' )
          FAMILY="${CLUSTER%-cluster}-api"

          TASKDEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Running migrations on $CLUSTER using $TASKDEF"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASKDEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["npm","run","db:migrate"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          echo "Waiting for migration task $TASK_ARN..."
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          TASK_JSON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN")
          EXIT_CODE=$(echo "$TASK_JSON" | jq -r '.tasks[0].containers[0].exitCode // "None"')
          STOP_REASON=$(echo "$TASK_JSON" | jq -r '.tasks[0].stoppedReason // "unknown"')
          STOP_CODE=$(echo "$TASK_JSON" | jq -r '.tasks[0].stopCode // "unknown"')

          echo "Task stop code: $STOP_CODE"
          echo "Task stopped reason: $STOP_REASON"
          echo "Container exit code: $EXIT_CODE"

          TASK_ID="${TASK_ARN##*/}"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed (exit code: $EXIT_CODE, stop code: $STOP_CODE)"
            echo "Stopped reason: $STOP_REASON"
            aws logs get-log-events \
              --log-group-name "/ecs/${CLUSTER%-cluster}/api" \
              --log-stream-name "ecs/api/$TASK_ID" \
              --region "$AWS_REGION" \
              --output text --query 'events[*].message' 2>/dev/null || true
            exit 1
          fi
          echo "Migrations applied successfully."

      - name: Seed database — dev only (ECS run-task inside the VPC)
        # Seeds baseline users, parking spaces, tariffs, and settings for dev.
        # Idempotent (ON CONFLICT DO NOTHING). Never runs in prod.
        # Uses public subnets + assignPublicIp=ENABLED (no NAT Gateway required).
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SG=$(terraform output -raw app_security_group_id)
          SUBNETS=$(terraform output -json public_subnet_ids | tr -d '[]"' )
          FAMILY="${CLUSTER%-cluster}-api"

          TASKDEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Seeding database on $CLUSTER using $TASKDEF"

          aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASKDEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["npm","run","db:seed"]}]}'

      - name: Seed test data — pablo + vehicle (ECS run-task)
        # Inserts test user (pablo.siquinajay@galileo.edu) and an approved vehicle.
        # Uses crypto to encrypt/hashed the plate. Idempotent.
        # Requires: DATABASE_URL, ENCRYPTION_KEY, HMAC_KEY from ECS task secrets.
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SG=$(terraform output -raw app_security_group_id)
          SUBNETS=$(terraform output -json public_subnet_ids | tr -d '[]"' )
          FAMILY="${CLUSTER%-cluster}-api"

          TASKDEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Seeding test data on $CLUSTER using $TASKDEF"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASKDEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["npm","run","seed:test"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          echo "Waiting for seed:test task $TASK_ARN..."
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Seed test data failed with exit code $EXIT_CODE"
            TASK_ID="${TASK_ARN##*/}"
            aws logs get-log-events \
              --log-group-name "/ecs/${CLUSTER%-cluster}/api" \
              --log-stream-name "ecs/api/$TASK_ID" \
              --region "$AWS_REGION" \
              --output text --query 'events[*].message' 2>/dev/null || true
            exit 1
          fi
          echo "Test data seeded successfully."

      - name: Deploy services to ECS (roll onto latest task definition)
        # terraform apply registers new task-def revisions but the services use
        # ignore_changes=[task_definition], so they must be repointed explicitly.
        # Using the family name (no :revision suffix) resolves to the newest ACTIVE revision.
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          PREFIX="${CLUSTER%-cluster}"
          for SVC in api web worker; do
            echo "Deploying $PREFIX-$SVC-svc ..."
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$PREFIX-$SVC-svc" \
              --task-definition "$PREFIX-$SVC" \
              --force-new-deployment >/dev/null
          done
          for SVC in api web worker; do
            aws ecs wait services-stable --cluster "$CLUSTER" --services "$PREFIX-$SVC-svc"
          done
          echo "All services rolled onto latest task definitions."

  # ── Deploy staging (runs after dev succeeds, gated by required reviewer) ────
  # Pauses for a human approval in the 'staging' GitHub Environment before
  # Terraform applies. Configure the reviewer in:
  #   GitHub → Settings → Environments → staging → Required reviewers.
  deploy-staging:
    if: github.event.pull_request.merged == true
    name: Deploy → staging
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Lambda Layer (pdf-lib + qrcode)
        run: npm install --omit=dev
        working-directory: infra/modules/lambda/layer/nodejs

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config=envs/staging/backend-staging.hcl

      - name: Check S3 endpoint route tables
        id: s3check
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          REPLACE=""
          if terraform state show "module.network.aws_vpc_endpoint.s3[0]" &>/dev/null; then
            ROUTE_TABLES=$(terraform state show "module.network.aws_vpc_endpoint.s3[0]" | sed -n '/route_table_ids/,/]/p' | grep -oP 'rtb-[a-z0-9]+' || true)
            for rt in $ROUTE_TABLES; do
              if ! aws ec2 describe-route-tables --route-table-ids "$rt" --region "$AWS_REGION" &>/dev/null; then
                echo "Stale route table $rt no longer exists, forcing S3 endpoint recreation"
                REPLACE="-replace=module.network.aws_vpc_endpoint.s3[0]"
                break
              fi
            done
          fi
          echo "replace_flag=$REPLACE" >> $GITHUB_OUTPUT

      # Plan and apply the saved plan in the same job (same state, no drift
      # window): generate tfplan, then `terraform apply tfplan` — no -auto-approve.
      - name: Terraform Plan
        env:
          TF_VAR_db_password: ${{ secrets.STAGING_DB_PASSWORD }}
        run: terraform plan ${{ steps.s3check.outputs.replace_flag }} -out=tfplan -input=false -var-file=envs/staging/staging.tfvars

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-staging
          path: infra/tfplan
          retention-days: 5
          if-no-files-found: error

      - name: Terraform Apply (saved plan)
        run: terraform apply -input=false tfplan

      - name: Migrate database (ECS run-task inside the VPC)
        # Same as dev/prod: applies pending Drizzle migrations, waits, and fails
        # the pipeline on non-zero exit. No seed step — staging is production-like.
        # Uses public subnets + assignPublicIp=ENABLED (no NAT Gateway required).
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SG=$(terraform output -raw app_security_group_id)
          SUBNETS=$(terraform output -json public_subnet_ids | tr -d '[]"' )
          FAMILY="${CLUSTER%-cluster}-api"

          TASKDEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Running migrations on $CLUSTER using $TASKDEF"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASKDEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["npm","run","db:migrate"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          echo "Waiting for migration task $TASK_ARN..."
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          TASK_JSON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN")
          EXIT_CODE=$(echo "$TASK_JSON" | jq -r '.tasks[0].containers[0].exitCode // "None"')
          STOP_REASON=$(echo "$TASK_JSON" | jq -r '.tasks[0].stoppedReason // "unknown"')
          STOP_CODE=$(echo "$TASK_JSON" | jq -r '.tasks[0].stopCode // "unknown"')

          echo "Task stop code: $STOP_CODE"
          echo "Task stopped reason: $STOP_REASON"
          echo "Container exit code: $EXIT_CODE"

          TASK_ID="${TASK_ARN##*/}"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed (exit code: $EXIT_CODE, stop code: $STOP_CODE)"
            echo "Stopped reason: $STOP_REASON"
            aws logs get-log-events \
              --log-group-name "/ecs/${CLUSTER%-cluster}/api" \
              --log-stream-name "ecs/api/$TASK_ID" \
              --region "$AWS_REGION" \
              --output text --query 'events[*].message' 2>/dev/null || true
            exit 1
          fi
          echo "Migrations applied successfully."

      - name: Deploy services to ECS (roll onto latest task definition)
        # terraform apply registers new task-def revisions but the services use
        # ignore_changes=[task_definition], so they must be repointed explicitly.
        # Using the family name (no :revision suffix) resolves to the newest ACTIVE revision.
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          PREFIX="${CLUSTER%-cluster}"
          for SVC in api web worker; do
            echo "Deploying $PREFIX-$SVC-svc ..."
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$PREFIX-$SVC-svc" \
              --task-definition "$PREFIX-$SVC" \
              --force-new-deployment >/dev/null
          done
          for SVC in api web worker; do
            aws ecs wait services-stable --cluster "$CLUSTER" --services "$PREFIX-$SVC-svc"
          done
          echo "All services rolled onto latest task definitions."

  # ── Deploy prod (runs after staging succeeds, gated by required reviewer) ──
  # Requires a human approval in the 'prod' GitHub Environment before
  # Terraform applies. Configure the reviewer in:
  #   GitHub → Settings → Environments → prod → Required reviewers.
  deploy-prod:
    if: github.event.pull_request.merged == true
    name: Deploy → production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Lambda Layer (pdf-lib + qrcode)
        run: npm install --omit=dev
        working-directory: infra/modules/lambda/layer/nodejs

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config=envs/prod/backend-prod.hcl

      - name: Check S3 endpoint route tables
        id: s3check
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          REPLACE=""
          if terraform state show "module.network.aws_vpc_endpoint.s3[0]" &>/dev/null; then
            ROUTE_TABLES=$(terraform state show "module.network.aws_vpc_endpoint.s3[0]" | sed -n '/route_table_ids/,/]/p' | grep -oP 'rtb-[a-z0-9]+' || true)
            for rt in $ROUTE_TABLES; do
              if ! aws ec2 describe-route-tables --route-table-ids "$rt" --region "$AWS_REGION" &>/dev/null; then
                echo "Stale route table $rt no longer exists, forcing S3 endpoint recreation"
                REPLACE="-replace=module.network.aws_vpc_endpoint.s3[0]"
                break
              fi
            done
          fi
          echo "replace_flag=$REPLACE" >> $GITHUB_OUTPUT

      # Plan and apply the saved plan in the same job (same state, no drift
      # window): generate tfplan, then `terraform apply tfplan` — no -auto-approve.
      - name: Terraform Plan
        run: terraform plan ${{ steps.s3check.outputs.replace_flag }} -out=tfplan -input=false -var-file=envs/prod/prod.tfvars

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: infra/tfplan
          retention-days: 5
          if-no-files-found: error

      - name: Terraform Apply (saved plan)
        run: terraform apply -input=false tfplan

      - name: Migrate database (ECS run-task inside the VPC)
        # Same as dev: applies pending Drizzle migrations, waits, and fails the
        # pipeline on non-zero exit. No seed step — prod data is never seeded.
        # Uses public subnets + assignPublicIp=ENABLED (no NAT Gateway required).
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SG=$(terraform output -raw app_security_group_id)
          SUBNETS=$(terraform output -json public_subnet_ids | tr -d '[]"' )
          FAMILY="${CLUSTER%-cluster}-api"

          TASKDEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Running migrations on $CLUSTER using $TASKDEF"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASKDEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["npm","run","db:migrate"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          echo "Waiting for migration task $TASK_ARN..."
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          TASK_JSON=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN")
          EXIT_CODE=$(echo "$TASK_JSON" | jq -r '.tasks[0].containers[0].exitCode // "None"')
          STOP_REASON=$(echo "$TASK_JSON" | jq -r '.tasks[0].stoppedReason // "unknown"')
          STOP_CODE=$(echo "$TASK_JSON" | jq -r '.tasks[0].stopCode // "unknown"')

          echo "Task stop code: $STOP_CODE"
          echo "Task stopped reason: $STOP_REASON"
          echo "Container exit code: $EXIT_CODE"

          TASK_ID="${TASK_ARN##*/}"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed (exit code: $EXIT_CODE, stop code: $STOP_CODE)"
            echo "Stopped reason: $STOP_REASON"
            aws logs get-log-events \
              --log-group-name "/ecs/${CLUSTER%-cluster}/api" \
              --log-stream-name "ecs/api/$TASK_ID" \
              --region "$AWS_REGION" \
              --output text --query 'events[*].message' 2>/dev/null || true
            exit 1
          fi
          echo "Migrations applied successfully."

      - name: Deploy services to ECS (roll onto latest task definition)
        # terraform apply registers new task-def revisions but the services use
        # ignore_changes=[task_definition], so they must be repointed explicitly.
        # Using the family name (no :revision suffix) resolves to the newest ACTIVE revision.
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          PREFIX="${CLUSTER%-cluster}"
          for SVC in api web worker; do
            echo "Deploying $PREFIX-$SVC-svc ..."
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$PREFIX-$SVC-svc" \
              --task-definition "$PREFIX-$SVC" \
              --force-new-deployment >/dev/null
          done
          for SVC in api web worker; do
            aws ecs wait services-stable --cluster "$CLUSTER" --services "$PREFIX-$SVC-svc"
          done
          echo "All services rolled onto latest task definitions."

