name: Terraform CI / CD — OyD

# Trigger: all PR activity against main.
# - plan   → opened, updated, or reopened PRs (gates merge via branch ruleset)
# - deploy → when a PR is actually merged (closed + merged == true)
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Plan (runs on every PR update, not on close) ───────────────────────────
  # Authenticates with the dev OIDC role, plans against the dev environment,
  # and posts the plan diff as a collapsible PR comment.
  # This job's status is enforced by the main branch ruleset as a required check.
  plan:
    if: github.event.action != 'closed'
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config="key=env/dev/terraform.tfstate"

      - name: Terraform Format
        run: terraform fmt --check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -var-file=envs/dev/dev.tfvars -no-color 2>&1 | tee plan.txt
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `<details><summary>Terraform Plan (dev)</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`
            });

  # ── Deploy dev (runs on PR merge, auto-approved) ───────────────────────────
  # Applies the dev infrastructure immediately after merge. No reviewer gate —
  # the branch ruleset + required plan check is the merge control.
  deploy-dev:
    if: github.event.pull_request.merged == true
    name: Deploy → dev
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config="key=env/dev/terraform.tfstate"

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -var-file=envs/dev/dev.tfvars
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Seed database (ECS run-task inside the VPC)
        # RDS is in a private subnet unreachable from the runner, so the seed
        # runs as a one-off ECS task INSIDE the VPC, using the API task role
        # which already has network access to the DB. The seed script is idempotent.
        # TASKDEF is resolved from describe-task-definition (latest ACTIVE revision)
        # rather than from the service, which may still reference an older revision
        # when terraform apply creates a new task definition during the same run.
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SG=$(terraform output -raw app_security_group_id)
          SUBNETS=$(terraform output -json private_app_subnet_ids | tr -d '[]"' )

          # Family name = cluster name minus the "-cluster" suffix, plus "-api"
          FAMILY="${CLUSTER%-cluster}-api"

          TASKDEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Launching seed task on $CLUSTER using $TASKDEF"

          aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASKDEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["npm","run","db:seed"]}]}'

  # ── Deploy prod (runs after dev succeeds, gated by required reviewer) ──────
  # Requires a human approval in the 'production' GitHub Environment before
  # Terraform applies. Configure the reviewer in:
  #   GitHub → Settings → Environments → production → Required reviewers.
  deploy-prod:
    if: github.event.pull_request.merged == true
    name: Deploy → production
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config="key=env/prod/terraform.tfstate"

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -var-file=envs/prod/prod.tfvars
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Seed database (ECS run-task inside the VPC)
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SERVICE=$(terraform output -raw ecs_api_service_name)
          SG=$(terraform output -raw app_security_group_id)
          SUBNETS=$(terraform output -json private_app_subnet_ids | tr -d '[]"' )

          TASKDEF=$(aws ecs describe-services \
            --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].taskDefinition' --output text)

          echo "Launching seed task on $CLUSTER using $TASKDEF"

          aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASKDEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["npm","run","db:seed"]}]}'
