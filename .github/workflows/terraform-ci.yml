name: Terraform CI / CD — OyD

# Trigger: all PR activity against main.
# - plan   → opened, updated, or reopened PRs (gates merge via branch ruleset)
# - deploy → when a PR is actually merged (closed + merged == true)
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  # DELIVERY J (disabled temporarily — re-enable after Slack bot is deployed)
  # workflow_dispatch:
  #   inputs:
  #     environment:
  #       description: "Target environment to deploy (dev or staging)"
  #       required: true
  #       type: choice
  #       options:
  #         - dev
  #         - staging

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Plan (runs on every PR update, not on close) ───────────────────────────
  # Authenticates with the dev OIDC role, plans against the dev environment,
  # and posts the plan diff as a collapsible PR comment.
  # This job's status is enforced by the main branch ruleset as a required check.
  plan:
    if: github.event.action != 'closed'
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config=envs/dev/backend-dev.hcl

      - name: Terraform Format
        run: terraform fmt --check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -var-file=envs/dev/dev.tfvars -no-color 2>&1 | tee plan.txt

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `<details><summary>Terraform Plan (dev)</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`
            });

  # ── Deploy dev (runs on PR merge, auto-approved) ───────────────────────────
  # Applies the dev infrastructure immediately after merge. No reviewer gate —
  # the branch ruleset + required plan check is the merge control.
  deploy-dev:
    if: github.event.pull_request.merged == true
    name: Deploy → dev
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config=envs/dev/backend-dev.hcl

      - name: Terraform Apply
        env:
          TF_VAR_db_password: ${{ secrets.DEV_DB_PASSWORD }}
        run: terraform apply -auto-approve -input=false -var-file=envs/dev/dev.tfvars

      - name: Migrate database (ECS run-task inside the VPC)
        # Applies any pending Drizzle migration files (drizzle/migrations/) that
        # have not yet been recorded in the drizzle_migrations table. Idempotent.
        # Waits for the task to stop and fails the pipeline on non-zero exit so a
        # broken migration blocks the deploy before the app restarts.
        # Uses public subnets + assignPublicIp=ENABLED (no NAT Gateway required).
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SG=$(terraform output -raw app_security_group_id)
          SUBNETS=$(terraform output -json public_subnet_ids | tr -d '[]"' )
          FAMILY="${CLUSTER%-cluster}-api"

          TASKDEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Running migrations on $CLUSTER using $TASKDEF"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASKDEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["npm","run","db:migrate"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          echo "Waiting for migration task $TASK_ARN..."
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            TASK_ID="${TASK_ARN##*/}"
            aws logs get-log-events \
              --log-group-name "/ecs/${CLUSTER%-cluster}/api" \
              --log-stream-name "ecs/api/$TASK_ID" \
              --region "$AWS_REGION" \
              --output text --query 'events[*].message' 2>/dev/null || true
            exit 1
          fi
          echo "Migrations applied successfully."

      - name: Seed database — dev only (ECS run-task inside the VPC)
        # Seeds baseline users, parking spaces, tariffs, and settings for dev.
        # Idempotent (ON CONFLICT DO NOTHING). Never runs in prod.
        # Uses public subnets + assignPublicIp=ENABLED (no NAT Gateway required).
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SG=$(terraform output -raw app_security_group_id)
          SUBNETS=$(terraform output -json public_subnet_ids | tr -d '[]"' )
          FAMILY="${CLUSTER%-cluster}-api"

          TASKDEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Seeding database on $CLUSTER using $TASKDEF"

          aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASKDEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["npm","run","db:seed"]}]}'

      - name: Deploy services to ECS (roll onto latest task definition)
        # terraform apply registers new task-def revisions but the services use
        # ignore_changes=[task_definition], so they must be repointed explicitly.
        # Using the family name (no :revision suffix) resolves to the newest ACTIVE revision.
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          PREFIX="${CLUSTER%-cluster}"
          for SVC in api web worker; do
            echo "Deploying $PREFIX-$SVC-svc ..."
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$PREFIX-$SVC-svc" \
              --task-definition "$PREFIX-$SVC" \
              --force-new-deployment >/dev/null
          done
          for SVC in api web worker; do
            aws ecs wait services-stable --cluster "$CLUSTER" --services "$PREFIX-$SVC-svc"
          done
          echo "All services rolled onto latest task definitions."

  # ── Deploy staging (runs after dev succeeds, gated by required reviewer) ────
  # Pauses for a human approval in the 'staging' GitHub Environment before
  # Terraform applies. Configure the reviewer in:
  #   GitHub → Settings → Environments → staging → Required reviewers.
  deploy-staging:
    if: github.event.pull_request.merged == true
    name: Deploy → staging
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config=envs/staging/backend-staging.hcl

      - name: Terraform Apply
        env:
          TF_VAR_db_password: ${{ secrets.STAGING_DB_PASSWORD }}
        run: terraform apply -auto-approve -input=false -var-file=envs/staging/staging.tfvars

      - name: Migrate database (ECS run-task inside the VPC)
        # Same as dev/prod: applies pending Drizzle migrations, waits, and fails
        # the pipeline on non-zero exit. No seed step — staging is production-like.
        # Uses public subnets + assignPublicIp=ENABLED (no NAT Gateway required).
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SG=$(terraform output -raw app_security_group_id)
          SUBNETS=$(terraform output -json public_subnet_ids | tr -d '[]"' )
          FAMILY="${CLUSTER%-cluster}-api"

          TASKDEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Running migrations on $CLUSTER using $TASKDEF"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASKDEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["npm","run","db:migrate"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          echo "Waiting for migration task $TASK_ARN..."
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            TASK_ID="${TASK_ARN##*/}"
            aws logs get-log-events \
              --log-group-name "/ecs/${CLUSTER%-cluster}/api" \
              --log-stream-name "ecs/api/$TASK_ID" \
              --region "$AWS_REGION" \
              --output text --query 'events[*].message' 2>/dev/null || true
            exit 1
          fi
          echo "Migrations applied successfully."

      - name: Deploy services to ECS (roll onto latest task definition)
        # terraform apply registers new task-def revisions but the services use
        # ignore_changes=[task_definition], so they must be repointed explicitly.
        # Using the family name (no :revision suffix) resolves to the newest ACTIVE revision.
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          PREFIX="${CLUSTER%-cluster}"
          for SVC in api web worker; do
            echo "Deploying $PREFIX-$SVC-svc ..."
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$PREFIX-$SVC-svc" \
              --task-definition "$PREFIX-$SVC" \
              --force-new-deployment >/dev/null
          done
          for SVC in api web worker; do
            aws ecs wait services-stable --cluster "$CLUSTER" --services "$PREFIX-$SVC-svc"
          done
          echo "All services rolled onto latest task definitions."

  # ── Deploy prod (runs after staging succeeds, gated by required reviewer) ──
  # Requires a human approval in the 'prod' GitHub Environment before
  # Terraform applies. Configure the reviewer in:
  #   GitHub → Settings → Environments → prod → Required reviewers.
  deploy-prod:
    if: github.event.pull_request.merged == true
    name: Deploy → production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false -backend-config=envs/prod/backend-prod.hcl

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -var-file=envs/prod/prod.tfvars

      - name: Migrate database (ECS run-task inside the VPC)
        # Same as dev: applies pending Drizzle migrations, waits, and fails the
        # pipeline on non-zero exit. No seed step — prod data is never seeded.
        # Uses public subnets + assignPublicIp=ENABLED (no NAT Gateway required).
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SG=$(terraform output -raw app_security_group_id)
          SUBNETS=$(terraform output -json public_subnet_ids | tr -d '[]"' )
          FAMILY="${CLUSTER%-cluster}-api"

          TASKDEF=$(aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Running migrations on $CLUSTER using $TASKDEF"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASKDEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["npm","run","db:migrate"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          echo "Waiting for migration task $TASK_ARN..."
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
