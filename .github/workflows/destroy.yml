name: Terraform Destroy (Gated)

# Manual-only workflow to destroy an environment's infrastructure.
# Destroying 'prod' is double-gated:
#   1. The 'confirm' input must exactly match the environment name.
#   2. The 'prod' GitHub Environment requires a human reviewer approval
#      before any steps run (configure in Settings → Environments → prod).
#
# NOTE: Destroying prod will fail until you manually disable deletion
# protection on RDS (deletion_protection = true in prod.tfvars). This is
# intentional — it prevents accidental data loss.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - prod
      confirm:
        description: "Type the environment name exactly to confirm (dev or prod)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  destroy:
    name: Destroy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      # Share the concurrency group with deploy jobs to prevent simultaneous apply+destroy
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./infra

    steps:
      # Guard: fail fast if the confirmation string doesn't match the target.
      # This prevents accidentally destroying the wrong environment when the
      # operator selects from the dropdown without reading carefully.
      - name: Verify confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "${{ inputs.environment }}" ]; then
            echo "::error::Confirmation mismatch."
            echo "::error::  Selected environment : ${{ inputs.environment }}"
            echo "::error::  You typed            : ${{ inputs.confirm }}"
            echo "::error::Re-run and type the environment name exactly."
            exit 1
          fi
          echo "Confirmed: destroying '${{ inputs.environment }}'"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve backend and var-file paths
        id: paths
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "backend_config=envs/prod/backend-prod.hcl" >> "$GITHUB_OUTPUT"
            echo "tfvars=envs/prod/prod.tfvars"              >> "$GITHUB_OUTPUT"
          else
            echo "backend_config=envs/dev/backend-dev.hcl" >> "$GITHUB_OUTPUT"
            echo "tfvars=envs/dev/dev.tfvars"              >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Init
        run: terraform init -input=false -backend-config=${{ steps.paths.outputs.backend_config }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var-file=${{ steps.paths.outputs.tfvars }}
