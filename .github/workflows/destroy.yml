name: Terraform Destroy (Gated)

# Manual-only workflow (workflow_dispatch) to destroy an environment's
# infrastructure. Select the target environment (dev / staging / prod) from the
# dropdown. Destroys are double-gated:
#   1. The 'confirm' input must exactly match the environment name.
#   2. The selected GitHub Environment's reviewer gate (staging / prod) requires
#      a human approval before any steps run (Settings → Environments → <env>).
#
# NOTE: Destroying staging or prod will fail until you manually disable deletion
# protection on RDS (deletion_protection = true in staging.tfvars / prod.tfvars).
# This is intentional — it prevents accidental data loss.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirm:
        description: "Type the environment name exactly to confirm (dev, staging or prod)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  destroy:
    name: Destroy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      # Share the concurrency group with deploy jobs to prevent simultaneous apply+destroy
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./infra

    steps:
      # Guard: fail fast if the confirmation string doesn't match the target.
      # This prevents accidentally destroying the wrong environment when the
      # operator selects from the dropdown without reading carefully.
      - name: Verify confirmation
        working-directory: .
        run: |
          if [ "${{ inputs.confirm }}" != "${{ inputs.environment }}" ]; then
            echo "::error::Confirmation mismatch."
            echo "::error::  Selected environment : ${{ inputs.environment }}"
            echo "::error::  You typed            : ${{ inputs.confirm }}"
            echo "::error::Re-run and type the environment name exactly."
            exit 1
          fi
          echo "Confirmed: destroying '${{ inputs.environment }}'"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Backend and var-file are derived directly from the selected environment,
      # so dev / staging / prod each resolve to their own state and values.
      # Paths are relative to the ./infra working directory (i.e. infra/envs/<env>/...).
      - name: Terraform Init
        run: terraform init -input=false -backend-config=envs/${{ inputs.environment }}/backend-${{ inputs.environment }}.hcl

      # Confirmation print before the destructive step (visible in the run log
      # and in the dry-run evidence).
      - name: Confirm destroy target
        run: 'echo "Destroying: ${{ inputs.environment }}"'

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var-file=envs/${{ inputs.environment }}/${{ inputs.environment }}.tfvars
